################################################################################
# GitHub Actions — Recon Manager CI/CD
#
# AUTORE: Scotti Davide - Università Statale degli Studi di Milano
# VERSIONE: 1.0
#
# Esegue:
#   - ShellCheck su tutti gli script .sh
#   - Lint dei codici Python incorporati
#   - Build immagine Docker
#   - Verifica checksum SHA256
################################################################################

name: Recon Manager CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          ignore_names: 'venv,node_modules,.git'
          severity: 'warning'
          
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install flake8
        run: pip install flake8
        
      - name: Run flake8
        run: |
          # Ignora errori di stile (E501 = line too long)
          flake8 . --count --max-line-length=120 \
            --extend-ignore=E501,E203,W503 \
            --show-source --statistics
          
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: recon-manager:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Test Docker image
        run: docker run --rm recon-manager:test --help