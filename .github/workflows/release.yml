# ============================================================================
# GitHub Actions CI/CD - Recon Manager
# Build verification + automatic checksum generation
#
# AUTORE: Scotti Davide - Universita Statale degli Studi di Milano
# ============================================================================

name: CI/CD - Recon Manager

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  validate:
    name: Validate & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Shell Script Validation
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          
      - name: Docker Build Verification
        run: docker build -t recon-manager:test .
        
      - name: Generate Checksums
        run: sha256sum *.sh > checksums.sha256
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: recon-manager
          path: |
            *.sh
            checksums.sha256
            recon.conf
            Dockerfile
            docker-compose.yml