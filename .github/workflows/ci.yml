################################################################################
# GitHub Actions — Recon Manager CI/CD
#
# AUTORE: Scotti Davide - Università Statale degli Studi di Milano
# VERSIONE: 1.0
#
# Esegue:
#   - ShellCheck su tutti gli script .sh
#   - Lint dei codici Python incorporati
#   - Build immagine Docker
#   - Verifica checksum SHA256
################################################################################

name: Recon Manager CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - '*.sh'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'Makefile'
      - 'recon.conf'
      - '.github/workflows/*'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - '*.sh'
      - 'Dockerfile'
  workflow_dispatch:  # Esecuzione manuale

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/recon-manager
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # ── ShellCheck: lint di tutti gli script bash ──
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore: 'sessioni output targets'
          severity: 'warning'
        env:
          SHELLCHECK_OPTS: -s bash

  # ── Python lint: verifica sintassi codici Python incorporati ──
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml reportlab

      - name: Extract and check embedded Python scripts
        run: |
          echo "=== Verifica sintassi Python incorporato ==="
          # Estrai blocchi Python da recognize.sh e report_pdf.sh
          for script in recognize.sh report_pdf.sh; do
            if [ -f "$script" ]; then
              echo "--- $script ---"
              # Estrai blocchi PYEOF e verifica sintassi
              awk '/^python3.*<< .*PYEOF$/,/^PYEOF$/' "$script" 2>/dev/null | \
                python3 -m py_compile - 2>&1 || true
            fi
          done

      - name: Verify recon.conf YAML
        run: |
          echo "=== Verifica YAML ==="
          python3 -c "import yaml; yaml.safe_load(open('recon.conf')); print('✓ YAML valido')" || echo "⚠️ YAML non valido (non bloccante)"

  # ── Checksum verification ──
  checksum:
    name: Checksum Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify SHA256 checksums
        run: |
          if [ -f checksums.sha256 ]; then
            sha256sum -c checksums.sha256 --quiet && echo "✓ Checksum OK" || echo "⚠️ Checksum mismatch"
          else
            echo "⚠️ checksums.sha256 non trovato, genero..."
            sha256sum *.sh > checksums.sha256
            echo "✓ checksums.sha256 generato"
          fi

  # ── Docker build ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [shellcheck]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max