# ============================================================================
# GitHub Actions CI/CD — Recon Manager
# Build verification + automatic checksum generation
#
# AUTORE: Scotti Davide - Università Statale degli Studi di Milano
# ============================================================================

name: CI/CD - Recon Manager

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '*.sh'
      - 'recon.conf'
      - 'Dockerfile'
      - 'Makefile'
  pull_request:
    branches: [ main, master ]
    paths:
      - '*.sh'
  release:
    types: [ published ]

jobs:
  shellcheck:
    name: Shell Script Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck on all scripts
        run: |
          for script in *.sh; do
            echo "→ Checking $script..."
            shellcheck --shell=bash --severity=warning "$script" || true
          done
        continue-on-error: true

      - name: Run bash syntax check
        run: |
          errors=0
          for script in *.sh; do
            echo "→ Syntax: $script"
            bash -n "$script" 2>/dev/null && echo "  ✅ OK" || { echo "  ❌ ERROR"; errors=$((errors+1)); }
          done
          exit $errors

  build-docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: shellcheck
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: recon-manager:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image (help)
        run: |
          docker run --rm recon-manager:test --help || true

  checksum:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: shellcheck
    if: github.event_name == 'release'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SHA256 checksums
        run: |
          sha256sum *.sh > checksums.sha256
          cat checksums.sha256

      - name: Upload checksums as artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.sha256

  release:
    name: Create Release Artifacts
    runs-on: ubuntu-latest
    needs: [shellcheck, build-docker]
    if: github.event_name == 'release'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package release
        run: |
          mkdir -p release
          cp *.sh recon.conf Dockerfile docker-compose.yml Makefile release/
          cp -r .github release/ 2>/dev/null || true
          cd release
          sha256sum *.sh > checksums.sha256
          tar czf ../recon-manager-${{ github.ref_name }}.tar.gz .
          cd ..
          echo "Release package: recon-manager-${{ github.ref_name }}.tar.gz"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: recon-manager-${{ github.ref_name }}
          path: recon-manager-${{ github.ref_name }}.tar.gz